<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Not Found</title>

<style>
/* CSS Reset & Modern Typography Setup */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  min-height: 100vh;
  display: flex; /* FIXED: Added missing semicolon */
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #23a6d5);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  color: white;
  text-align: center;
  padding: 20px;
  overflow: hidden;
}

/* Smooth Background Gradient Animation */
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Container Box with modern Glassmorphic styling */
.box {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 40px 60px;
  border-radius: 24px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
  max-width: 500px;
  width: 100%;
  animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 404 Heading with subtle pulsing scale instead of rigid bounce */
h1 {
  font-size: clamp(80px, 15vw, 130px);
  font-weight: 900;
  margin: 0;
  background: linear-gradient(135deg, #ffffff, #a1c4fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: pulse 4s ease-in-out infinite;
  letter-spacing: -2px;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

h2 {
  font-size: clamp(20px, 5vw, 26px);
  margin: 10px 0 15px 0;
  font-weight: 600;
}

p {
  font-size: clamp(14px, 4vw, 16px);
  color: rgba(255, 255, 255, 0.75);
  line-height: 1.6;
  margin: 0 0 30px 0;
}

/* Sleek, Accessible Button Style */
a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 32px;
  background: #ffffff;
  color: #0f2027;
  text-decoration: none;
  border-radius: 50px;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.5px;
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

a:hover {
  background: #ff9800;
  color: #ffffff;
  transform: translateY(-3px);
  box-shadow: 0 15px 25px rgba(255, 152, 0, 0.4);
}

a:active {
  transform: translateY(-1px);
}
</style>

</head>
<body>

<div class="box">
  <h1>404</h1>
  <h2>Oops! Page Not Found</h2>
  <p>The page you are looking for is missing, has been removed, or has moved to a new destination.</p>
  <a href="index.html">🏠 Go Home</a>
</div>

</body>
</html>
