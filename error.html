<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<!-- Import Premium Font -->
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  font-family: 'Plus Jakarta Sans', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #050508; /* Ultra Pitch Black */
  overflow: hidden;
  position: relative;
}

/* Background Canvas for Particles */
#particle-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: all;
}

/* Solid Matrix-Dark Container */
.box {
  position: relative;
  z-index: 10;
  padding: 3rem 4rem;
  background: rgba(10, 10, 15, 0.85); /* Deep dark background */
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(0, 255, 157, 0.15); /* Toxic Neon Border */
  border-radius: 24px;
  text-align: center;
  max-width: 500px;
  width: 90%;
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 255, 157, 0.03);
  opacity: 0;
  transform: translateY(40px) scale(0.95);
  animation: revealCard 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes revealCard {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* 404 Toxic Neon Text */
h1 {
  font-size: 140px;
  font-weight: 800;
  line-height: 1;
  margin: 0 0 10px 0;
  background: linear-gradient(135deg, #00ff9d, #00bfff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  position: relative;
  animation: float 6s ease-in-out infinite;
}

/* Glowing Aura behind text */
h1::after {
  content: '404';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #00ff9d, #00bfff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: blur(30px);
  opacity: 0.5;
  z-index: -1;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
}

h2 {
  font-size: 26px;
  color: #ffffff;
  margin: 0 0 12px 0;
  font-weight: 600;
  letter-spacing: -0.5px;
}

p {
  font-size: 15px;
  color: #71717a; /* Muted dark text */
  margin: 0 0 32px 0;
  line-height: 1.6;
}

/* Radioactive Premium Button */
.btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 32px;
  background: linear-gradient(135deg, #00ff9d, #00bfff);
  color: #000000; /* High contrast black text */
  text-decoration: none;
  border-radius: 50px;
  font-weight: 800;
  font-size: 15px;
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 25px rgba(0, 255, 157, 0.4);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #00bfff, #00ff9d);
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 1;
  border-radius: 50px;
}

.btn span {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn i {
  transition: transform 0.3s ease;
  font-style: normal;
}

/* Hover Dynamics */
.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 35px rgba(0, 255, 157, 0.6);
}

.btn:hover::before {
  opacity: 1;
}

.btn:hover i {
  transform: translateX(-4px);
}

.btn:active {
  transform: translateY(-1px);
}
</style>
</head>
<body>

<!-- Animated Dark Interacting Canvas -->
<canvas id="particle-canvas"></canvas>

<div class="box">
  <h1>404</h1>
  <h2>System Error: Null</h2>
  <p>The dark sector you requested does not exist. Return to secure operations immediately.</p>
  <a href="index.html" class="btn">
    <span><i>←</i> go to Home</span>
  </a>
</div>

<script>
// Interactive Dark Constellation Script
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');

let particles = [];
const mouse = { x: null, y: null, radius: 140 };

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

window.addEventListener('mousemove', (e) => {
  mouse.x = e.x;
  mouse.y = e.y;
});

window.addEventListener('mouseout', () => {
  mouse.x = null;
  mouse.y = null;
});

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 1.5 + 0.8;
    this.baseX = this.x;
    this.baseY = this.y;
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.speedY = (Math.random() - 0.5) * 0.4;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;

    // Repel particles from cursor
    if (mouse.x != null && mouse.y != null) {
      let dx = mouse.x - this.x;
      let dy = mouse.y - this.y;
      let distance = Math.hypot(dx, dy);
      
      if (distance < mouse.radius) {
        let force = (mouse.radius - distance) / mouse.radius;
        let directionX = dx / distance;
        let directionY = dy / distance;
        
        this.x -= directionX * force * 4;
        this.y -= directionY * force * 4;
      }
    }
  }

  draw() {
    ctx.fillStyle = 'rgba(0, 255, 157, 0.25)';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.closePath();
    ctx.fill();
  }
}

function init() {
  particles = [];
  const numberOfParticles = (canvas.width * canvas.height) / 11000;
  for (let i = 0; i < numberOfParticles; i++) {
    particles.push(new Particle());
  }
}

function connect() {
  let opacityValue = 1;
  for (let a = 0; a < particles.length; a++) {
    for (let b = a; b < particles.length; b++) {
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let distance = Math.hypot(dx, dy);

      if (distance < 120) {
        opacityValue = 1 - (distance / 120);
        ctx.strokeStyle = `rgba(0, 255, 157, ${opacityValue * 0.08})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = 0; i < particles.length; i++) {
    particles[i].update();
    particles[i].draw();
  }
  connect();
  requestAnimationFrame(animate);
}

init();
animate();
window.addEventListener('resize', init);
</script>

</body>
</html>
